<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systems CR Tracker | Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .stat-card { border: 1px solid #e2e8f0; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Systems CR Tracker</h1>
                <p id="api-status" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 italic">Connected via Direct Sync</p>
            </div>
            <div class="flex gap-3">
                <button onclick="loadData()" class="p-4 bg-white rounded-2xl border border-slate-200 hover:bg-slate-50">
                    <i data-lucide="refresh-cw" id="sync-icon" class="w-5 h-5 text-slate-600"></i>
                </button>
                <button onclick="document.getElementById('modal').classList.remove('hidden')" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 transition hover:bg-indigo-700">
                    + New Entry
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <div class="stat-card bg-white p-8 rounded-[2rem]">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Total CRs</p>
                <h2 id="total-val" class="text-4xl font-black mt-2">0</h2>
            </div>
            <div class="stat-card bg-indigo-600 p-8 rounded-[2rem] text-white">
                <p class="text-indigo-200 text-[10px] font-bold uppercase tracking-widest">Total Hours</p>
                <h2 id="hours-val" class="text-4xl font-black mt-2">0h</h2>
            </div>
            <div class="stat-card bg-white p-8 rounded-[2rem]">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">In Dev</p>
                <h2 id="dev-val" class="text-4xl font-black mt-2">0</h2>
            </div>
            <div class="stat-card bg-white p-8 rounded-[2rem]">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Completed</p>
                <h2 id="done-val" class="text-4xl font-black mt-2">0</h2>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr class="text-slate-400 text-[11px] font-bold uppercase tracking-widest">
                            <th class="px-10 py-6">ID</th>
                            <th class="px-10 py-6">Team</th>
                            <th class="px-10 py-6">Hours</th>
                            <th class="px-10 py-6">Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-50 text-sm">
                        <tr><td colspan="4" class="p-10 text-center text-slate-400">Fetching data from Google Sheets...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-lg p-10 shadow-2xl">
            <h2 class="text-2xl font-black mb-6">New Record</h2>
            <form id="cr-form" onsubmit="handlePost(event)" class="space-y-4">
                <input type="text" id="i1" placeholder="CR Number" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="text" id="i2" placeholder="Requested Team" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="number" id="i3" placeholder="Hours" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                <select id="i4" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <option>To Be Assigned</option>
                    <option>Development In Progress</option>
                    <option>Completed</option>
                </select>
                <textarea id="i5" placeholder="Details" required class="w-full p-4 bg-slate-50 border rounded-2xl h-24 outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                <div class="flex gap-3 pt-4">
                    <button type="submit" id="save-btn" class="flex-1 bg-indigo-600 text-white font-bold py-4 rounded-2xl">Save to Sheet</button>
                    <button type="button" onclick="document.getElementById('modal').classList.add('hidden')" class="px-8 py-4 bg-slate-100 rounded-2xl font-bold text-slate-500">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Direct URL - No Proxy
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGK356S6dBoR5Zd3fVh7FK3jl8nGVMzSrLLR43JbUmHLAxg310-iiheVNZOUvgF0ydfA/exec";

        // JSONP Logic: Bypass Fetch/CORS completely
        function loadData() {
            const icon = document.getElementById('sync-icon');
            if(icon) icon.classList.add('animate-spin');
            
            // Create a unique callback name
            const callbackName = 'google_cb_' + Math.round(100000 * Math.random());
            
            window[callbackName] = function(data) {
                renderUI(data);
                // Cleanup
                delete window[callbackName];
                const scripts = document.querySelectorAll('script[data-type="jsonp"]');
                scripts.forEach(s => s.remove());
                if(icon) icon.classList.remove('animate-spin');
            };

            const script = document.createElement('script');
            script.src = SCRIPT_URL + (SCRIPT_URL.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
            script.setAttribute('data-type', 'jsonp');
            document.body.appendChild(script);
        }

        function renderUI(data) {
            const table = document.getElementById('table-body');
            table.innerHTML = '';
            let hrs = 0, dev = 0, done = 0;

            if (!data || data.length === 0) {
                table.innerHTML = '<tr><td colspan="4" class="p-10 text-center">No records found.</td></tr>
