<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CR Tracker | Final Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .stat-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">Systems CR Tracker</h1>
                <div class="flex items-center gap-2 mt-2">
                    <div class="h-2 w-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <p id="api-status" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">GSheet Sync Active</p>
                </div>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <button onclick="loadDashboardData()" class="flex-1 md:flex-none p-4 bg-white rounded-2xl border border-slate-200 hover:bg-slate-50 transition">
                    <i data-lucide="refresh-cw" id="sync-icon" class="w-5 h-5 text-slate-600"></i>
                </button>
                <button onclick="document.getElementById('entry-modal').classList.remove('hidden')" class="flex-[3] md:flex-none bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-2xl font-bold shadow-xl shadow-indigo-100 transition-all active:scale-95">
                    + New CR Entry
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <div class="stat-card bg-white p-8 rounded-[2.5rem]">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Total Requests</p>
                <h2 id="total-val" class="text-5xl font-black mt-2 tracking-tighter">0</h2>
            </div>
            <div class="stat-card bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-2xl shadow-indigo-200">
                <p class="text-indigo-200 text-[10px] font-bold uppercase tracking-widest">Commitment</p>
                <h2 id="hours-val" class="text-5xl font-black mt-2 tracking-tighter">0h</h2>
            </div>
            <div class="stat-card bg-white p-8 rounded-[2.5rem]">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">In Dev</p>
                <h2 id="dev-val" class="text-5xl font-black mt-2 tracking-tighter text-blue-600">0</h2>
            </div>
            <div class="stat-card bg-white p-8 rounded-[2.5rem]">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Completed</p>
                <h2 id="done-val" class="text-5xl font-black mt-2 tracking-tighter text-emerald-600">0</h2>
            </div>
        </div>

        <div class="bg-white rounded-[3rem] border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50/50 border-b border-slate-100">
                        <tr class="text-slate-400 text-[11px] font-bold uppercase tracking-widest">
                            <th class="px-10 py-6">ID</th>
                            <th class="px-10 py-6">Requested Team</th>
                            <th class="px-10 py-6">Hours</th>
                            <th class="px-10 py-6">Status</th>
                        </tr>
                    </thead>
                    <tbody id="main-table" class="divide-y divide-slate-50 text-sm font-medium">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="entry-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[3rem] w-full max-w-lg p-10 shadow-2xl">
            <h2 class="text-3xl font-black mb-2">New Record</h2>
            <p class="text-slate-400 text-sm mb-8 font-semibold uppercase tracking-widest">Sync directly to GSheet</p>
            <form id="cr-form" onsubmit="handlePost(event)" class="space-y-4">
                <input type="text" id="in-crs" placeholder="CR Number" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="text" id="in-team" placeholder="Requested Team" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="number" id="in-hrs" placeholder="Hours" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                <select id="in-stat" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <option>To Be Assigned</option>
                    <option>Development In Progress</option>
                    <option>Completed</option>
                    <option>Pending</option>
                </select>
                <textarea id="in-det" placeholder="Details" required class="w-full p-4 bg-slate-50 border rounded-2xl h-24 outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                <div class="flex gap-4 pt-4">
                    <button type="submit" id="post-btn" class="flex-1 bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-xl hover:bg-indigo-700 transition">Save & Sync</button>
                    <button type="button" onclick="document.getElementById('entry-modal').classList.add('hidden')" class="px-10 py-5 bg-slate-100 rounded-2xl font-bold text-slate-500">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxxslPiMiWCflieg7Hz1ejxc1ephDxSt3s2-TsZlYM8DUbaS0Pc6M28jrRbRxQmjR8S1A/exec";

        // Helper to find data even if capitalization is different
        function getVal(row, key) {
            const keys = Object.keys(row);
            const found = keys.find(k => k.toLowerCase().replace(/\s/g, '') === key.toLowerCase());
            return found ? row[found] : "";
        }

        async function loadDashboardData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('animate-spin');
            
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                const tableBody = document.getElementById('main-table');
                tableBody.innerHTML = '';
                let hrsTotal = 0, devCount = 0, doneCount = 0;

                data.forEach(item => {
                    const id = getVal(item, "crs");
                    const team = getVal(item, "requestedteam");
                    const hourStr = getVal(item, "commitmenthours");
                    const status = getVal(item, "crstatus");

                    const nHour = parseInt(hourStr) || 0;
                    hrsTotal += nHour;
                    if(status.toLowerCase().includes('dev')) devCount++;
                    if(status.toLowerCase().includes('complet')) doneCount++;

                    tableBody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition group">
                            <td class="px-10 py-6 font-bold text-indigo-600">${id}</td>
                            <td class="px-10 py-6 text-slate-600 font-semibold">${team}</td>
                            <td class="px-10 py-6 text-slate-400 font-black tracking-tight">${nHour}h</td>
                            <td class="px-10 py-6">
                                <span class="px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest ${status.toLowerCase().includes('complet') ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'}">
                                    ${status}
                                </span>
                            </td>
                        </tr>
                    `;
                });

                document.getElementById('total-val').innerText = data.length;
                document.getElementById('hours-val').innerText = hrsTotal + 'h';
                document.getElementById('dev-val').innerText = devCount;
                document.getElementById('done-val').innerText = doneCount;
                document.getElementById('api-status').innerText = `Live: ${data.length} Records Connected`;

            } catch (err) {
                document.getElementById('api-status').innerText = "Sync Error - Check Console";
            } finally {
                icon.classList.remove('animate-spin');
                lucide.createIcons();
            }
        }

        async function handlePost(e) {
            e.preventDefault();
            const btn = document.getElementById('post-btn');
            btn.innerText = "Processing..."; btn.disabled = true;

            const payload = {
                crs: document.getElementById('in-crs').value,
                team: document.getElementById('in-team').value,
                hours: document.getElementById('in-hrs').value,
                status: document.getElementById('in-stat').value,
                details: document.getElementById('in-det').value
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                document.getElementById('entry-modal').classList.add('hidden');
                document.getElementById('cr-form').reset();
                setTimeout(loadDashboardData, 2000);
            } catch (err) { alert("Network error."); }
            finally { btn.innerText = "Save & Sync"; btn.disabled = false; }
        }

        window.onload = loadDashboardData;
    </script>
</body>
</html>
